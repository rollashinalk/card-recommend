<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>일본 결제 카드 추천</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="card">
        <h1>일본 결제 카드 추천</h1>
        <p class="muted">JPY 금액을 넣으면 등록한 행사 기준으로 가장 유리한 카드를 추천합니다.</p>
      </header>

      <section class="card">
        <div class="row between">
          <h2>실시간 환율 (USD/JPY)</h2>
          <button id="refreshRateBtn" class="secondary">환율 새로고침</button>
        </div>
        <p id="rateText">불러오는 중...</p>
        <p id="rateUpdated" class="muted"></p>
      </section>

      <section class="card">
        <h2>결제 계산</h2>
        <div class="grid">
          <label>
            결제 금액 (JPY)
            <input type="number" id="paymentJpy" placeholder="예: 12000" min="0" step="1" />
          </label>
          <label>
            결제 날짜
            <input type="date" id="paymentDate" />
          </label>
          <label>
            국가
            <select id="paymentCountry">
              <option value="JP">일본 (JP)</option>
            </select>
          </label>
          <label>
            결제 방식
            <select id="paymentChannel">
              <option value="offline">오프라인</option>
              <option value="online">온라인</option>
            </select>
          </label>
        </div>
        <button id="calculateBtn">최적 카드 계산</button>
        <div id="result" class="result"></div>
      </section>

      <section class="card">
        <h2>내 카드 목록</h2>
        <div id="cardList"></div>
      </section>

      <section class="card">
        <h2>행사 관리</h2>
        <form id="promoForm" class="grid">
          <label>
            행사명
            <input type="text" id="promoName" required placeholder="예: KB 유니온페이 일본 오프라인" />
          </label>
          <label>
            대상 카드
            <select id="promoCard"></select>
          </label>
          <label>
            시작일
            <input type="date" id="promoStart" required />
          </label>
          <label>
            종료일
            <input type="date" id="promoEnd" required />
          </label>
          <label>
            대상 국가
            <input type="text" id="promoCountry" value="JP" maxlength="2" required />
          </label>
          <label>
            결제 방식
            <select id="promoChannel" required>
              <option value="offline">오프라인</option>
              <option value="online">온라인</option>
              <option value="both">둘 다</option>
            </select>
          </label>
          <label>
            최소 결제 금액
            <input type="number" id="promoMinAmount" min="0" step="0.01" required />
          </label>
          <label>
            최소 금액 통화
            <select id="promoMinCurrency" required>
              <option value="JPY">JPY</option>
              <option value="USD">USD</option>
            </select>
          </label>
          <label>
            할인율 (%)
            <input type="number" id="promoDiscountPercent" min="0" max="100" step="0.01" required />
          </label>
          <label>
            건당 최대 할인
            <input type="number" id="promoMaxDiscount" min="0" step="0.01" required />
          </label>
          <label>
            최대 할인 통화
            <select id="promoMaxCurrency" required>
              <option value="JPY">JPY</option>
              <option value="USD">USD</option>
            </select>
          </label>
          <label>
            기간 중 최대 횟수
            <input type="number" id="promoMaxUses" min="1" step="1" required />
          </label>
          <label>
            현재 사용 횟수
            <input type="number" id="promoUsedCount" min="0" step="1" value="0" required />
          </label>
          <label>
            총 할인 한도
            <input type="number" id="promoTotalLimit" min="0" step="0.01" placeholder="미입력 시 제한 없음" />
          </label>
          <label>
            총 한도 통화
            <select id="promoTotalLimitCurrency">
              <option value="JPY">JPY</option>
              <option value="USD">USD</option>
            </select>
          </label>
          <label>
            누적 할인 사용액
            <input type="number" id="promoTotalUsed" min="0" step="0.01" value="0" />
          </label>
          <label>
            월 할인 한도
            <input type="number" id="promoMonthlyLimit" min="0" step="0.01" placeholder="미입력 시 제한 없음" />
          </label>
          <label>
            월 한도 통화
            <select id="promoMonthlyLimitCurrency">
              <option value="JPY">JPY</option>
              <option value="USD">USD</option>
            </select>
          </label>
          <label>
            당월 할인 사용액
            <input type="number" id="promoMonthlyUsed" min="0" step="0.01" value="0" />
          </label>
        </form>
        <button form="promoForm" type="submit" id="addPromoBtn">행사 추가</button>
        <div id="promoList"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
